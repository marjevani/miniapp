<!DOCTYPE html>
<!--
  fb-classifier — Phase 6 manual-send Mini App.

  See marjevani/fb-classifier-private/docs/PHASE6_MANUAL_SEND.md for the
  full design (architecture, threat model, sprint breakdown) and
  docs/PHASE6_SECURITY_REVIEW.md (SEC-21..37) for the security audit.

  Zero secrets. Zero per-tenant data. Every draft-specific value is
  fetched from the backend via /api/draft_view after the user authenticates
  via Telegram-signed initData.

  SEC-24 hardening (2026-06-04): JS lives in app.js (NOT inlined here),
  so `script-src 'unsafe-inline'` is dropped from CSP — XSS payloads
  injected via a future bug can no longer execute.
-->
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<!-- SEC-36i (2026-06-04): no Referer header leak to GitHub Pages — keeps
     the `?startapp=...` value out of GitHub's access logs (defense-in-depth;
     in practice Telegram's WebView doesn't send Referer for t.me links). -->
<meta name="referrer" content="no-referrer">
<!-- SEC-24 hardened CSP (2026-06-04, then relaxed 2026-06-04 14:50
     after report that some Telegram clients show a blank screen with
     the stricter frame-ancestors):
       - `script-src` no longer allows 'unsafe-inline'; only SDK from
         telegram.org + `'self'` (app.js)
       - `base-uri 'none'` / `form-action 'none'` / `object-src 'none'`
       - `frame-ancestors` REMOVED — Telegram mobile WebView and desktop
         use different embedding contexts; the strict allowlist blocked
         rendering on at least one client (diagnosed via co-operator
         report 2026-06-04: blue screen, no content). The other CSP
         directives still close the main XSS attack vector.
       - `img-src` no longer allows `data:` (no inline images needed) -->
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           script-src 'self' https://telegram.org;
           style-src 'self' 'unsafe-inline';
           connect-src https://maors-mac-mini.tail8c31b6.ts.net;
           img-src 'self';
           base-uri 'none';
           form-action 'none';
           object-src 'none';">
<!-- Public HTTPS hostname of the Tailscale Funnel forwarding to the
     operator's Mac at 127.0.0.1:8765. Must match the CSP `connect-src`
     above; if it changes, update BOTH. -->
<meta name="miniapp-api-url" content="https://maors-mac-mini.tail8c31b6.ts.net">
<title>שליחה ידנית</title>
<!-- Telegram WebApp SDK from CDN. Cached across Mini Apps the user opens. -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- Pre-establish TCP+TLS to facebook.com so the openLink redirect lands
     ~150ms faster on the tap (FB DNS+handshake already done). -->
<link rel="preconnect" href="https://www.facebook.com">
<!-- Co-operator feedback 2026-06-04: first-time Mini App load took 5-6s on
     cellular. Dominant cost was DNS+TLS handshake to the Tailscale Funnel
     hostname AT THE MOMENT app.js fires fetch(). Preconnecting during HTML
     parse lets that handshake complete in parallel with SDK loading,
     shaving 1-3s off the first POST. Subsequent opens reuse the connection
     and were already fast. -->
<link rel="preconnect" href="https://maors-mac-mini.tail8c31b6.ts.net" crossorigin>
<style>
  :root {
    color-scheme: light dark;
    --fg: var(--tg-theme-text-color, #000);
    --fg-muted: var(--tg-theme-hint-color, #888);
    --bg: var(--tg-theme-bg-color, #fff);
    --bg-sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
    --accent: var(--tg-theme-button-color, #1e88e5);
    --border: var(--tg-theme-section-separator-color, #e5e5e5);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 15px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 640px; margin: 0 auto; padding: 14px 14px 24px; }
  .card {
    background: var(--bg-sec); border-radius: 12px; padding: 12px 14px;
    margin-bottom: 10px; border: 1px solid var(--border);
  }
  .card-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--fg-muted); font-weight: 600; margin-bottom: 6px;
  }
  .draft-text {
    white-space: pre-wrap; word-break: break-word;
    font-size: 15px; line-height: 1.55;
  }
  /* O2 (2026-06-04): the draft is a real <textarea> so the in-page
     button can document.execCommand('copy') on it. Styled to LOOK
     like a card body — no visible border, transparent background,
     auto-grow within max-height.
     2026-06-05: max-height tightened from 50vh to 32vh so the button
     stays visible in compact-mode (the bottom-sheet viewport is
     ~55-65vh on most phones). Long drafts scroll internally inside
     the textarea instead of pushing the button off-screen. User can
     swipe up to expand the Mini App if they want a fuller view. */
  textarea.draft-text {
    width: 100%;
    min-height: 80px;
    max-height: 32vh;
    padding: 0;
    margin: 0;
    border: none;
    outline: none;
    background: transparent;
    color: var(--fg);
    font: inherit;
    line-height: 1.55;
    resize: none;
    overflow-y: auto;
    -webkit-appearance: none;
    direction: rtl;
  }
  /* Primary action — replaces Telegram's MainButton because MainButton
     taps arrive via postMessage and don't satisfy Chromium's transient
     activation check for clipboard writes in Telegram Android WebView.
     A real in-page <button> click DOES create that activation. */
  .primary-btn {
    display: block;
    width: 100%;
    padding: 16px;
    margin: 14px 0 4px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .primary-btn:disabled {
    opacity: 0.5;
    cursor: default;
  }
  .err-box {
    background: #f8d7da; color: #721c24;
    border: 1px solid #f5c6cb; border-radius: 10px;
    padding: 16px; margin: 16px; text-align: center; font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-label">טיוטה לשליחה</div>
    <!-- O2 (2026-06-04): draft display is a real <textarea> (not a div)
         so app.js can document.execCommand('copy') on it after an
         in-page button click. Styled via textarea.draft-text in
         <style> above to look identical to the previous <div> body.
         Static "loading" value so a JS-failure / CSP-block / cached-
         broken-state never produces a blank screen. -->
    <textarea class="draft-text" id="draft-text-display" readonly dir="rtl">טוען טיוטה…</textarea>
  </div>
  <!-- Primary action button — in-page <button>, NOT MainButton. See
       app.js comment for the load-bearing gesture-activation rationale.
       Initially disabled until the draft loads from the backend. -->
  <button id="send-btn" class="primary-btn" disabled>📤 שלח ידנית</button>
  <noscript>
    <div class="err-box">
      JavaScript נדרש לפעולת המיני־אפ.<br>
      ודא שטלגרם מעודכן ונסה שוב.
    </div>
  </noscript>
</div>
<!-- SEC-24: external script (defer for clean DOM-ready ordering).
     Inlined IIFE would require `script-src 'unsafe-inline'` — dropped 2026-06-04. -->
<script src="app.js" defer></script>
</body>
</html>
